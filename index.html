<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宣传资料</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f7fa;
            color: #333;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            color: #fff;
            padding: 12px 16px;
            text-align: center;
            font-size: 14px;
        }
        .pdf-viewer {
            width: 100%;
            height: calc(100vh - 44px);
            border: none;
        }
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 80vh;
            flex-direction: column;
            color: #999;
        }
        .loading .spinner {
            width: 32px; height: 32px; margin: 0 auto 12px;
            border: 3px solid #e0e0e0; border-top-color: #1a73e8;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .list-view { max-width: 640px; margin: 0 auto; padding: 16px; }
        .section-title {
            font-size: 14px; color: #888; margin: 8px 0 12px;
            padding-left: 4px; font-weight: 500;
        }
        .pdf-list { display: flex; flex-direction: column; gap: 12px; }
        .pdf-card {
            background: #fff; border-radius: 12px; padding: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            display: flex; align-items: center; gap: 14px;
            cursor: pointer; text-decoration: none; color: inherit;
            transition: transform 0.15s;
        }
        .pdf-card:active { transform: scale(0.98); }
        .pdf-icon {
            width: 44px; height: 52px; flex-shrink: 0;
            background: #e53935; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; color: #fff; font-weight: 700;
            box-shadow: 0 1px 3px rgba(229,57,53,0.3);
        }
        .pdf-icon::after {
            content: ''; position: absolute; top: 0; right: 0;
            border-style: solid; border-width: 0 12px 12px 0;
            border-color: rgba(255,255,255,0.25) #fff #fff rgba(255,255,255,0.25);
        }
        .pdf-info { flex: 1; min-width: 0; }
        .pdf-name { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pdf-meta { font-size: 12px; color: #999; margin-top: 4px; }
        .pdf-arrow { color: #bbb; font-size: 18px; flex-shrink: 0; }
        .footer {
            text-align: center; padding: 8px; font-size: 12px; color: #bbb;
            border-top: 1px solid #f0f0f0;
        }
    </style>
</head>
<body>
    <div class="header" id="header">
        📄 宣传资料
    </div>

    <!-- 加载中 -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>加载中...</p>
    </div>

    <!-- 多文件列表（仅当有多个PDF时显示） -->
    <div id="listView" style="display:none">
        <div class="list-view">
            <div class="section-title">📋 资料列表（点击预览）</div>
            <div class="pdf-list" id="pdfList"></div>
        </div>
        <div class="footer">资料持续更新，扫码查看最新版本</div>
    </div>

    <!-- 单个PDF直接展示（默认） -->
    <div id="singleView" style="display:none">
        <iframe class="pdf-viewer" id="pdfFrame" src=""></iframe>
    </div>

    <script>
        const API_URL = 'https://api.github.com/repos/wey27/GZYXC/contents/content?ref=main';
        const RAW_BASE = 'https://raw.githubusercontent.com/wey27/GZYXC/main/content/';

        function formatSize(bytes) {
            if (!bytes) return '';
            if (bytes < 1024) return bytes + 'B';
            if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + 'KB';
            return (bytes/(1024*1024)).toFixed(1) + 'MB';
        }

        async function load() {
            const loading = document.getElementById('loading');
            try {
                const resp = await fetch(API_URL);
                if (!resp.ok) throw new Error('失败');
                const files = await resp.json();
                const pdfs = files.filter(f => f.name.toLowerCase().endsWith('.pdf'));

                if (pdfs.length === 0) {
                    loading.innerHTML = '<p style="padding-top:40vh;color:#999">暂无资料</p>';
                    return;
                }

                if (pdfs.length === 1) {
                    // 只有一份PDF → 直接展示
                    const pdfUrl = RAW_BASE + encodeURIComponent(pdfs[0].name);
                    const googleViewer = 'https://docs.google.com/viewer?embedded=true&url=' + encodeURIComponent(pdfUrl);
                    document.getElementById('pdfFrame').src = googleViewer;
                    document.getElementById('singleView').style.display = 'block';
                    loading.style.display = 'none';
                } else {
                    // 多份PDF → 显示列表
                    renderList(pdfs);
                }

            } catch(e) {
                loading.innerHTML = '<p style="padding-top:40vh;color:#999">加载失败，请刷新重试</p>';
            }
        }

        function renderList(pdfs) {
            const list = document.getElementById('pdfList');
            list.innerHTML = '';
            for (const f of pdfs) {
                const card = document.createElement('a');
                card.className = 'pdf-card';
                card.href = '#';
                const pdfUrl = RAW_BASE + encodeURIComponent(f.name);
                card.onclick = (e) => {
                    e.preventDefault();
                    const viewer = 'https://docs.google.com/viewer?embedded=true&url=' + encodeURIComponent(pdfUrl);
                    document.getElementById('header').textContent = '📄 ' + f.name.replace(/\.pdf$/i, '');
                    document.getElementById('pdfFrame').src = viewer;
                    document.getElementById('listView').style.display = 'none';
                    document.getElementById('singleView').style.display = 'block';
                };
                card.innerHTML = `
                    <div class="pdf-icon">PDF</div>
                    <div class="pdf-info">
                        <div class="pdf-name">${f.name.replace(/\.pdf$/i, '')}</div>
                        <div class="pdf-meta">${formatSize(f.size)}</div>
                    </div>
                    <div class="pdf-arrow">›</div>
                `;
                list.appendChild(card);
            }
            document.getElementById('loading').style.display = 'none';
            document.getElementById('listView').style.display = 'block';
        }

        load();
    </script>
</body>
</html>
