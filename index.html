<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宣传资料</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f7fa;
            color: #333;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            color: #fff;
            padding: 28px 20px 20px;
            text-align: center;
        }
        .header h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
        .header p { font-size: 13px; opacity: 0.85; }
        .container { max-width: 640px; margin: 0 auto; padding: 16px; }
        .section-title {
            font-size: 14px; color: #888; margin: 8px 0 12px;
            padding-left: 4px; font-weight: 500;
        }
        .pdf-list { display: flex; flex-direction: column; gap: 12px; }
        .pdf-card {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            gap: 14px;
            transition: transform 0.15s, box-shadow 0.15s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }
        .pdf-card:active { transform: scale(0.98); box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
        .pdf-icon {
            width: 44px; height: 52px; flex-shrink: 0;
            background: #e53935; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; color: #fff; font-weight: 700;
            letter-spacing: 0.5px; position: relative;
            box-shadow: 0 1px 3px rgba(229,57,53,0.3);
        }
        .pdf-icon::after {
            content: ''; position: absolute; top: 0; right: 0;
            border-style: solid; border-width: 0 12px 12px 0;
            border-color: rgba(255,255,255,0.25) #fff #fff rgba(255,255,255,0.25);
        }
        .pdf-info { flex: 1; min-width: 0; }
        .pdf-name { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pdf-meta { font-size: 12px; color: #999; margin-top: 4px; }
        .pdf-arrow { color: #bbb; font-size: 18px; flex-shrink: 0; }
        .empty-state {
            text-align: center; padding: 60px 20px; color: #999;
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
        .empty-state p { font-size: 14px; line-height: 1.6; }
        .footer {
            text-align: center; padding: 24px 16px 32px;
            font-size: 12px; color: #bbb;
        }
        /* Loading */
        .loading { text-align: center; padding: 60px 20px; color: #999; }
        .loading .spinner {
            width: 32px; height: 32px; margin: 0 auto 12px;
            border: 3px solid #e0e0e0; border-top-color: #1a73e8;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 预览弹窗 */
        .overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: 100;
            padding: 12px; padding-top: 48px;
        }
        .overlay.active { display: flex; flex-direction: column; }
        .overlay-header {
            display: flex; justify-content: space-between; align-items: center;
            background: #fff; border-radius: 12px 12px 0 0;
            padding: 12px 16px;
        }
        .overlay-header .name { font-size: 14px; font-weight: 500; max-width: 70%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .overlay-header .close-btn {
            background: none; border: none; font-size: 22px; color: #666;
            cursor: pointer; padding: 4px 8px; line-height: 1;
        }
        .overlay-body {
            flex: 1; background: #fff; border-radius: 0 0 12px 12px;
            overflow: hidden; display: flex; flex-direction: column;
        }
        .overlay-body iframe {
            width: 100%; flex: 1; border: none;
        }
        .overlay-actions {
            display: flex; gap: 10px; padding: 12px 16px 16px;
            background: #fff; border-radius: 0 0 12px 12px;
            border-top: 1px solid #eee;
        }
        .overlay-actions a {
            flex: 1; text-align: center; padding: 10px;
            border-radius: 8px; font-size: 14px; font-weight: 500;
            text-decoration: none;
        }
        .btn-download {
            background: #1a73e8; color: #fff;
        }
        .btn-view {
            background: #f0f4ff; color: #1a73e8;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📄 宣传资料</h1>
        <p>点击文件即可预览或下载</p>
    </div>
    <div class="container" id="app">
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>加载中...</p>
        </div>
        <div class="empty-state" id="empty" style="display:none">
            <div class="icon">📂</div>
            <p>暂无资料<br>请稍后再来看看</p>
        </div>
        <div id="content" style="display:none">
            <div class="section-title">📋 资料列表</div>
            <div class="pdf-list" id="pdfList"></div>
        </div>
    </div>

    <!-- 预览弹窗 -->
    <div class="overlay" id="previewOverlay">
        <div class="overlay-header">
            <span class="name" id="previewName"></span>
            <button class="close-btn" onclick="closePreview()">✕</button>
        </div>
        <div class="overlay-body">
            <iframe id="previewIframe"></iframe>
        </div>
        <div class="overlay-actions">
            <a class="btn-view" id="previewViewBtn" target="_blank">新窗口打开</a>
            <a class="btn-download" id="previewDownloadBtn" download>下载文件</a>
        </div>
    </div>

    <div class="footer">
        资料持续更新，扫码查看最新版本
    </div>

    <script>
        // PDF 文件列表 - 从 content/ 目录自动加载
        // GitHub Pages 不支持目录列表，所以需要手动维护
        // 新增 PDF 时在这里加一行即可
        const PDF_FILES = [
            // 格式: { name: "显示名称", file: "文件名.pdf" }
            // ↓↓↓ 从这里开始加文件 ↓↓↓
            // { name: "示例宣传册", file: "example.pdf" }
            // ↑↑↑ 加在这里 ↑↑↑
        ];

        // 格式化文件大小（通过 fetch 获取）
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + 'B';
            if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + 'KB';
            return (bytes/(1024*1024)).toFixed(1) + 'MB';
        }

        // 获取文件信息和修改时间
        async function getFileInfo(fileName) {
            try {
                const resp = await fetch('content/' + fileName, { method: 'HEAD' });
                const size = resp.headers.get('Content-Length');
                const lastMod = resp.headers.get('Last-Modified');
                return {
                    size: size ? formatSize(parseInt(size)) : '未知大小',
                    date: lastMod ? new Date(lastMod).toLocaleDateString('zh-CN') : ''
                };
            } catch {
                return { size: '', date: '' };
            }
        }

        // 渲染列表
        async function renderList() {
            const loading = document.getElementById('loading');
            const empty = document.getElementById('empty');
            const content = document.getElementById('content');
            const list = document.getElementById('pdfList');

            if (PDF_FILES.length === 0) {
                loading.style.display = 'none';
                empty.style.display = 'block';
                return;
            }

            list.innerHTML = '';
            for (const item of PDF_FILES) {
                const info = await getFileInfo(item.file);
                const card = document.createElement('a');
                card.className = 'pdf-card';
                card.href = '#';
                card.onclick = (e) => {
                    e.preventDefault();
                    openPreview(item, info);
                };
                card.innerHTML = `
                    <div class="pdf-icon">PDF</div>
                    <div class="pdf-info">
                        <div class="pdf-name">${item.name}</div>
                        <div class="pdf-meta">${info.size}${info.date ? ' · ' + info.date : ''}</div>
                    </div>
                    <div class="pdf-arrow">›</div>
                `;
                list.appendChild(card);
            }

            loading.style.display = 'none';
            content.style.display = 'block';
        }

        // 预览弹窗
        function openPreview(item, info) {
            const overlay = document.getElementById('previewOverlay');
            const name = document.getElementById('previewName');
            const iframe = document.getElementById('previewIframe');
            const viewBtn = document.getElementById('previewViewBtn');
            const downloadBtn = document.getElementById('previewDownloadBtn');

            const fileUrl = 'content/' + encodeURIComponent(item.file);

            name.textContent = item.name;
            // 使用 Google Docs Viewer 嵌入 PDF（手机端友好）
            iframe.src = 'https://docs.google.com/viewer?embedded=true&url=' + encodeURIComponent(window.location.href + fileUrl);
            viewBtn.href = fileUrl;
            downloadBtn.href = fileUrl;
            downloadBtn.download = item.file;

            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closePreview() {
            document.getElementById('previewOverlay').classList.remove('active');
            document.getElementById('previewIframe').src = '';
            document.body.style.overflow = '';
        }

        // 点击遮罩关闭
        document.getElementById('previewOverlay').addEventListener('click', function(e) {
            if (e.target === this) closePreview();
        });

        renderList();
    </script>
</body>
</html>
